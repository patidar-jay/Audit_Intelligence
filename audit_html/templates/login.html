<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Intelligence — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🔍</div>
      <h1>Audit <span>Intelligence</span></h1>
      <p>AI-Based Financial Fraud Detection System</p>
    </div>

    <div id="demo-banner" class="alert alert-warning mb-16" style="display:none">
      ⚠️ MySQL not connected — running in Demo Mode
    </div>

    <!-- Tabs -->
    <div class="tabs" style="margin-bottom:20px">
      <button class="tab-btn active" data-tab="tab-login" data-tab-group="auth">🔐 Login</button>
      <button class="tab-btn" data-tab="tab-register" data-tab-group="auth">📝 Register</button>
    </div>

    <!-- Login Tab -->
    <div class="tab-content active" id="tab-login" data-tab-group="auth">
      <div id="login-error" class="alert alert-error" style="display:none"></div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="login-user" placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-pass" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-bottom:10px">Login →</button>
      <div style="text-align:center;color:var(--muted);font-size:12px;margin:10px 0">— or —</div>
      <button class="btn btn-secondary btn-full" onclick="demoLogin()">🎯 Try Demo (No Login Required)</button>
      <div class="alert alert-info mt-16" style="text-align:center;font-size:12px">
        Default admin: <strong>admin</strong> / <strong>admin123</strong>
      </div>
    </div>

    <!-- Register Tab -->
    <div class="tab-content" id="tab-register" data-tab-group="auth">
      <div id="reg-error"   class="alert alert-error"   style="display:none"></div>
      <div id="reg-success" class="alert alert-success" style="display:none"></div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="reg-user" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="reg-pass" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" id="reg-conf" placeholder="Repeat password">
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account →</button>
    </div>

    <div style="text-align:center;color:var(--muted);font-size:11px;margin-top:24px">
      Medi-Caps University · Jay Solanki & Jaydeep Patidar · B.Tech CSE 2023-27
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/static/js/utils.js"></script>
<script>
  initTabs();

  // Check if already logged in
  if (Session.get("user")) window.location.href = "/dashboard";

  // Check DB status
  fetch("/health").then(r=>r.json()).then(d => {
    if (!d.mysql) document.getElementById("demo-banner").style.display = "block";
  });

  async function doLogin() {
    const username = document.getElementById("login-user").value.trim();
    const password = document.getElementById("login-pass").value;
    const errEl    = document.getElementById("login-error");
    errEl.style.display = "none";
    if (!username) { errEl.textContent = "Please enter your username."; errEl.style.display="block"; return; }
    if (!password) { errEl.textContent = "Please enter your password."; errEl.style.display="block"; return; }
    try {
      const data = await api("/api/login", "POST", { username, password });
      Session.set("user", data.user);
      window.location.href = "/dashboard";
    } catch(e) {
      errEl.textContent = e.message;
      errEl.style.display = "block";
    }
  }

  function demoLogin() {
    Session.set("user", { id:1, username:"demo_user", full_name:"Demo Auditor",
                          email:"demo@medicaps.ac.in", role:"auditor" });
    window.location.href = "/dashboard";
  }

  async function doRegister() {
    const full_name = document.getElementById("reg-name").value.trim();
    const username  = document.getElementById("reg-user").value.trim();
    const email     = document.getElementById("reg-email").value.trim();
    const password  = document.getElementById("reg-pass").value;
    const confirm   = document.getElementById("reg-conf").value;
    const errEl = document.getElementById("reg-error");
    const okEl  = document.getElementById("reg-success");
    errEl.style.display = "none"; okEl.style.display = "none";

    if (!full_name || !username || !email || !password || !confirm) {
      errEl.textContent = "Please fill in all fields."; errEl.style.display="block"; return;
    }
    if (password.length < 6) {
      errEl.textContent = "Password must be at least 6 characters."; errEl.style.display="block"; return;
    }
    if (password !== confirm) {
      errEl.textContent = "Passwords do not match."; errEl.style.display="block"; return;
    }
    try {
      await api("/api/register", "POST", { full_name, username, email, password });
      okEl.textContent = "Account created! You can now login.";
      okEl.style.display = "block";
    } catch(e) {
      errEl.textContent = e.message; errEl.style.display="block";
    }
  }

  // Enter key support
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const activeTab = document.querySelector(".tab-content.active").id;
      if (activeTab === "tab-login")    doLogin();
      if (activeTab === "tab-register") doRegister();
    }
  });
</script>
</body>
</html>
